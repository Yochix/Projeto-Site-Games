<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LinKey — Entrar</title>
<script>
  // Se já estiver logado, vai direto para a loja
  if (localStorage.getItem('linkey_logged') === 'true') {
    window.location.href = '../../index.html';
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap">
<link rel="stylesheet" href="../css/style.css">
<style>
  .login-container {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 24px;
    background: linear-gradient(180deg, var(--bg) 0%, #1a1d27 100%);
  }
  .login-card {
    width: 100%;
    max-width: 400px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 24px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }
  .login-header {
    text-align: center;
    margin-bottom: 32px;
  }
  .login-logo {
    font-family: 'Syne', sans-serif;
    font-size: 2.2rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
    display: block;
  }
  .login-subtitle {
    color: var(--muted);
    font-size: 0.9rem;
  }
  .form-group {
    margin-bottom: 20px;
  }
  .form-group label {
    display: block;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 8px;
  }
  .form-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus {
    border-color: var(--accent);
  }
  .btn-login-submit {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-weight: 700;
    font-size: 1rem;
    padding: 14px;
    border-radius: var(--radius-sm);
    margin-top: 12px;
    transition: opacity 0.2s, transform 0.15s;
  }
  .btn-login-submit:active {
    opacity: 0.85;
    transform: scale(0.98);
  }
  .login-footer {
    text-align: center;
    margin-top: 24px;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .login-footer a {
    color: var(--accent);
    font-weight: 500;
  }
</style>
</head>
<body>

<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <a href="../../index.html" class="login-logo">LinKey</a>
      <p class="login-subtitle">Entre na sua conta para continuar</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">E-mail ou Usuário</label>
        <input type="text" id="email" class="form-input" placeholder="seu@email.com" required>
      </div>
      
      <div class="form-group">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
          <label for="password" style="margin: 0;">Senha</label>
          <a href="#" onclick="openForgotModal(event)" style="color: var(--accent); font-size: 0.75rem; text-decoration: none; font-weight: 500;">Esqueci a senha</a>
        </div>
        <input type="password" id="password" class="form-input" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn-login-submit" id="loginBtn">Entrar</button>
    </form>

    <div style="margin-top: 24px; text-align: center;">
      <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px;">
        <div style="flex: 1; height: 1px; background: var(--border);"></div>
        <span style="font-size: 0.75rem; color: var(--muted); font-weight: 600; text-transform: uppercase;">ou entrar com</span>
        <div style="flex: 1; height: 1px; background: var(--border);"></div>
      </div>
      
      <div style="display: flex; justify-content: center; gap: 16px;">
        <button class="btn-action" style="width: 50px; height: 50px; border-radius: 50%;" onclick="socialLogin('Google')">
          <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" style="width: 24px;">
        </button>
        <button class="btn-action" style="width: 50px; height: 50px; border-radius: 50%;" onclick="socialLogin('GitHub')">
          <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" style="width: 24px; filter: invert(1);">
        </button>
        <button class="btn-action" style="width: 50px; height: 50px; border-radius: 50%;" onclick="socialLogin('Discord')">
          <img src="https://cdn-icons-png.flaticon.com/512/3670/3670157.png" style="width: 24px;">
        </button>
      </div>
    </div>

    <div id="loginError" class="error-msg" style="color: #f87171; font-size: 0.8rem; margin-top: 10px; text-align: center; display: none;">E-mail ou senha incorretos.</div>

    <div class="login-footer">
      Não tem uma conta? <a href="cadastro.html">Criar agora</a>
    </div>
  </div>
  
  <a href="../../index.html" style="margin-top: 24px; color: var(--muted); font-size: 0.85rem;">← Voltar para a loja</a>
</div>

<!-- MODAL ESQUECI A SENHA -->
<div class="modal" id="forgotModal">
  <div class="modal-content">
    <div class="modal-title">Recuperar Senha</div>
    <p style="color: var(--muted); font-size: 0.85rem; margin-bottom: 20px;">Insira seu e-mail cadastrado para redefinir sua senha.</p>
    
    <div id="step1">
      <div class="form-group">
        <label>Seu E-mail</label>
        <input type="email" id="forgotEmail" class="form-input" placeholder="seu@email.com">
      </div>
      <div id="forgotError" style="color: #f87171; font-size: 0.75rem; margin-bottom: 15px; display: none;">E-mail não encontrado em nossa base.</div>
      <button class="btn-dl-page" onclick="checkEmail()" id="btnCheckEmail">Verificar E-mail</button>
    </div>

    <div id="step2" style="display: none;">
      <div class="form-group">
        <label>Nova Senha</label>
        <input type="password" id="newPass" class="form-input" placeholder="Mínimo 6 caracteres">
      </div>
      <button class="btn-dl-page" onclick="resetPassword()" id="btnResetPass">Redefinir Senha</button>
    </div>

    <button class="btn-edit" style="width: 100%; margin-top: 12px; border: none;" onclick="closeForgotModal()">Cancelar</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="../js/script.js"></script>
<script>
  // VERIFICAR RETORNO DE TOKEN (OAUTH REAL)
  document.addEventListener('DOMContentLoaded', () => {
    const hash = window.location.hash;
    const urlParams = new URLSearchParams(window.location.search);
    
    // Retorno Google/Discord (via hash #access_token) ou GitHub (via ?code)
    if (hash && hash.includes('access_token')) {
      const platform = hash.includes('google') ? 'Google' : 'Discord';
      showToast(`Autenticação ${platform} confirmada!`);
      setTimeout(() => socialLogin(platform, true), 1000);
    } else if (urlParams.has('code')) {
      showToast("Autenticação GitHub confirmada!");
      setTimeout(() => socialLogin('GitHub', true), 1000);
    }
  });

  // Ao enviar o formulário, simula o login salvando no navegador
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');

    // "BANCO DE DADOS": Pegar usuários existentes
    const users = await DB.users.getAll();

    // Verificar se e-mail e senha batem
    const userFound = users.find(u => u.email === email && u.password === password);

    if (!userFound) {
      loginError.style.display = 'block';
      return;
    }
    loginError.style.display = 'none';

    btn.textContent = 'Entrando...';
    btn.style.opacity = '0.7';
    btn.disabled = true;

    setTimeout(() => {
      // Salvar estado de login e dados do usuário logado
      localStorage.setItem('linkey_logged', 'true');
      DB.users.setLogged({ 
        name: userFound.name, 
        email: userFound.email,
        role: userFound.role || 'user',
        profilePic: userFound.profilePic || '',
        color: userFound.color || ''
      });
      
      window.location.href = '../../index.html';
    }, 800);
  });

  // LOGICA ESQUECI A SENHA
  function openForgotModal(e) {
    e.preventDefault();
    document.getElementById('forgotModal').classList.add('active');
    document.getElementById('step1').style.display = 'block';
    document.getElementById('step2').style.display = 'none';
    document.getElementById('forgotError').style.display = 'none';
  }

  function closeForgotModal() {
    document.getElementById('forgotModal').classList.remove('active');
  }

  async function checkEmail() {
    const email = document.getElementById('forgotEmail').value;
    const users = await DB.users.getAll();
    const user = users.find(u => u.email === email);

    if (user) {
      document.getElementById('step1').style.display = 'none';
      document.getElementById('step2').style.display = 'block';
      // Guardar e-mail para reset
      window.recoveryEmail = email;
    } else {
      document.getElementById('forgotError').style.display = 'block';
    }
  }

  async function resetPassword() {
    const newPass = document.getElementById('newPass').value;
    if (newPass.length < 6) {
      showToast("A senha deve ter pelo menos 6 caracteres.");
      return;
    }

    const users = await DB.users.getAll();
    const userIdx = users.findIndex(u => u.email === window.recoveryEmail);

    if (userIdx > -1) {
      users[userIdx].password = newPass;
      await DB.users.saveAll(users);
      showToast("Senha redefinida com sucesso!");
      closeForgotModal();
    }
  }

  function socialLogin(platform, alreadyAuthorized = false) {
    const handleLogin = async () => {
      // "BANCO DE DADOS": Pegar usuários existentes
      let users = await DB.users.getAll();
      let userFound = users.find(u => u.email === `social@${platform.toLowerCase()}.com`);

      if (!userFound) {
        // Se não existe, cria um usuário "vinculado"
        userFound = {
          name: `User ${platform}`,
          email: `social@${platform.toLowerCase()}.com`,
          password: Math.random().toString(36).slice(-8), // Senha aleatória
          role: 'user',
          color: 'var(--accent)',
          linked: [platform]
        };
        
        // Simula uma foto de perfil baseada na plataforma
        const pics = {
          'Google': 'https://lh3.googleusercontent.com/a/ACg8ocL8_...',
          'GitHub': 'https://avatars.githubusercontent.com/u/...',
          'Discord': 'https://cdn.discordapp.com/avatars/...'
        };
        userFound.profilePic = pics[platform] || '';

        users.push(userFound);
        await DB.users.saveAll(users);
      }

      showToast(`${platform} autorizado! Entrando...`);
      setTimeout(() => {
        // Salvar estado de login e dados do usuário logado
        localStorage.setItem('linkey_logged', 'true');
        DB.users.setLogged({ 
          name: userFound.name, 
          email: userFound.email,
          role: userFound.role || 'user',
          profilePic: userFound.profilePic || '',
          color: userFound.color || ''
        });
        window.location.href = '../../index.html';
      }, 1000);
    };

    if (alreadyAuthorized) {
      handleLogin();
    } else {
      openAuthModal(platform, handleLogin);
    }
  }
</script>

</body>
</html>
