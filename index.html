<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LinKey — Blibliotecas de Jogos   </title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <a href="index.html" class="logo">LinKey</a>
  <div class="header-actions">
    <a href="pages/usuario.html" class="header-avatar">JD</a>
  </div>
</header>

<div class="page-inner">

  <!-- BUSCA -->
  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="search" id="search" placeholder="Buscar jogos..." autocomplete="off">
    </div>
  </div>

  <!-- CARROSSEL -->
  <div id="featured-section">
    <div class="section-header">
      <span class="section-title">🔥 Em destaque</span>
      <a href="pages/explorar.html" class="section-link">Ver todos</a>
    </div>
    <div class="carousel-outer">
      <div class="carousel-track" id="carousel">
        <!-- Jogos em destaque carregados via JS -->
      </div>
      <div class="carousel-dots" id="dots">
        <!-- Pontos do carrossel carregados via JS -->
      </div>
    </div>
  </div>

  <!-- GRID -->
  <div id="grid-section">
    <div class="section-header">
      <span class="section-title" id="grid-title">🎮 Todos os jogos</span>
    </div>

    <div class="games-grid" id="grid">
      <!-- Os jogos serão carregados dinamicamente via JS -->
    </div>
  </div>

</div>

<nav class="bottom-nav">
  <button class="nav-tab active" onclick="location.href='index.html'">
    <span class="nav-icon">🏠</span>Início
  </button>
  <button class="nav-tab" onclick="location.href='pages/explorar.html'">
    <span class="nav-icon">🔍</span>Explorar
  </button>
  <button class="nav-tab" onclick="location.href='pages/biblioteca.html'">
    <span class="nav-icon">🎮</span>Biblioteca
  </button>
</nav>

<div class="toast" id="toast"></div>

<script src="js/script.js"></script>
</body>
</html>
