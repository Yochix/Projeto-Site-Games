<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LinKey — Criar Conta</title>
<script>
  // Se já estiver logado, vai direto para a loja
  if (localStorage.getItem('linkey_logged') === 'true') {
    window.location.href = '../index.html';
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap">
<link rel="stylesheet" href="../css/style.css">
<style>
  .login-container {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 24px;
    background: linear-gradient(180deg, var(--bg) 0%, #1a1d27 100%);
  }
  .login-card {
    width: 100%;
    max-width: 400px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 24px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }
  .login-header {
    text-align: center;
    margin-bottom: 24px;
  }
  .login-logo {
    font-family: 'Syne', sans-serif;
    font-size: 2.2rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
    display: block;
  }
  .login-subtitle {
    color: var(--muted);
    font-size: 0.9rem;
  }
  .form-group {
    margin-bottom: 16px;
  }
  .form-group label {
    display: block;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 8px;
  }
  .form-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus {
    border-color: var(--accent);
  }
  .btn-login-submit {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-weight: 700;
    font-size: 1rem;
    padding: 14px;
    border-radius: var(--radius-sm);
    margin-top: 12px;
    transition: opacity 0.2s, transform 0.15s;
  }
  .btn-login-submit:active {
    opacity: 0.85;
    transform: scale(0.98);
  }
  .login-footer {
    text-align: center;
    margin-top: 24px;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .login-footer a {
    color: var(--accent);
    font-weight: 500;
  }
  .error-msg {
    color: #f87171;
    font-size: 0.8rem;
    margin-top: 4px;
    display: none;
  }
</style>
</head>
<body>

<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <a href="../index.html" class="login-logo">LinKey</a>
      <p class="login-subtitle">Crie sua conta e comece a jogar</p>
    </div>

    <form id="registerForm">
      <div class="form-group">
        <label for="name">Nome Completo</label>
        <input type="text" id="name" class="form-input" placeholder="Seu nome" required>
      </div>

      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" class="form-input" placeholder="seu@email.com" required>
        <div id="emailError" class="error-msg">Este e-mail já está cadastrado.</div>
      </div>
      
      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" class="form-input" placeholder="••••••••" minlength="6" required>
      </div>

      <button type="submit" class="btn-login-submit" id="regBtn">Criar conta</button>
    </form>

    <div class="login-footer">
      Já tem uma conta? <a href="login.html">Fazer login</a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../js/script.js"></script>
<script>
  document.getElementById('registerForm').addEventListener('submit', (e) => {
    e.preventDefault();
    
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const btn = document.getElementById('regBtn');
    const emailError = document.getElementById('emailError');

    // "BANCO DE DADOS": Pegar usuários existentes ou criar array vazio
    let users = JSON.parse(localStorage.getItem('linkey_users') || '[]');

    // Verificar se e-mail já existe
    if (users.find(u => u.email === email)) {
      emailError.style.display = 'block';
      return;
    }
    emailError.style.display = 'none';

    btn.textContent = 'Criando...';
    btn.disabled = true;

    // Salvar novo usuário
    users.push({ name, email, password });
    localStorage.setItem('linkey_users', JSON.stringify(users));

    setTimeout(() => {
      // Logar automaticamente após cadastro
      localStorage.setItem('linkey_logged', 'true');
      localStorage.setItem('linkey_user_data', JSON.stringify({ 
        name, 
        email,
        role: 'user'
      }));
      
      window.location.href = '../index.html';
    }, 1200);
  });
</script>

</body>
</html>
