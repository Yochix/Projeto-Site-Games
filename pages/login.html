<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LinKey — Entrar</title>
<script>
  // Se já estiver logado, vai direto para a loja
  if (localStorage.getItem('linkey_logged') === 'true') {
    window.location.href = 'index.html';
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap">
<link rel="stylesheet" href="css/style.css">
<style>
  .login-container {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 24px;
    background: linear-gradient(180deg, var(--bg) 0%, #1a1d27 100%);
  }
  .login-card {
    width: 100%;
    max-width: 400px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 24px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }
  .login-header {
    text-align: center;
    margin-bottom: 32px;
  }
  .login-logo {
    font-family: 'Syne', sans-serif;
    font-size: 2.2rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
    display: block;
  }
  .login-subtitle {
    color: var(--muted);
    font-size: 0.9rem;
  }
  .form-group {
    margin-bottom: 20px;
  }
  .form-group label {
    display: block;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 8px;
  }
  .form-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus {
    border-color: var(--accent);
  }
  .btn-login-submit {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-weight: 700;
    font-size: 1rem;
    padding: 14px;
    border-radius: var(--radius-sm);
    margin-top: 12px;
    transition: opacity 0.2s, transform 0.15s;
  }
  .btn-login-submit:active {
    opacity: 0.85;
    transform: scale(0.98);
  }
  .login-footer {
    text-align: center;
    margin-top: 24px;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .login-footer a {
    color: var(--accent);
    font-weight: 500;
  }
</style>
</head>
<body>

<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <a href="index.html" class="login-logo">LinKey</a>
      <p class="login-subtitle">Entre na sua conta para continuar</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">E-mail ou Usuário</label>
        <input type="text" id="email" class="form-input" placeholder="seu@email.com" required>
      </div>
      
      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" class="form-input" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn-login-submit" id="loginBtn">Entrar</button>
    </form>

    <div id="loginError" class="error-msg" style="color: #f87171; font-size: 0.8rem; margin-top: 10px; text-align: center; display: none;">E-mail ou senha incorretos.</div>

    <div class="login-footer">
      Não tem uma conta? <a href="cadastro.html">Criar agora</a>
    </div>
  </div>
  
  <a href="index.html" style="margin-top: 24px; color: var(--muted); font-size: 0.85rem;">← Voltar para a loja</a>
</div>

<div class="toast" id="toast"></div>
<script src="js/script.js"></script>
<script>
  // Ao enviar o formulário, simula o login salvando no navegador
  document.getElementById('loginForm').addEventListener('submit', (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');

    // "BANCO DE DADOS": Pegar usuários existentes
    const users = JSON.parse(localStorage.getItem('linkey_users') || '[]');

    // Verificar se e-mail e senha batem
    const userFound = users.find(u => u.email === email && u.password === password);

    if (!userFound) {
      loginError.style.display = 'block';
      return;
    }
    loginError.style.display = 'none';

    btn.textContent = 'Entrando...';
    btn.style.opacity = '0.7';
    btn.disabled = true;

    setTimeout(() => {
      // Salvar estado de login e dados do usuário logado
      localStorage.setItem('linkey_logged', 'true');
      localStorage.setItem('linkey_user_data', JSON.stringify({ 
        name: userFound.name, 
        email: userFound.email,
        role: userFound.role || 'user'
      }));
      
      window.location.href = 'index.html';
    }, 800);
  });
</script>

</body>
</html>
