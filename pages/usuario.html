<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LinKey — Perfil</title>
<script>
  if (localStorage.getItem('linkey_logged') !== 'true') {
    window.location.href = 'login.html';
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header>
  <a href="../index.html" class="logo">LinKey</a>
  <div class="header-actions">
    <button onclick="logout()" class="btn-login" style="background:transparent;border:1px solid var(--border);color:var(--muted);font-size:0.75rem;padding:6px 12px;">Sair</button>
  </div>
</header>

<div class="page-inner">

  <!-- HERO DO PERFIL -->
  <div class="profile-hero">
    <div class="profile-avatar" id="profInit">JD</div>
    <div class="profile-name" id="profName">João da Silva</div>
    <div id="admBadge" style="display:none; background:var(--accent); color:#fff; font-size:0.65rem; font-weight:800; padding:2px 8px; border-radius:20px; margin-top:4px; text-transform:uppercase; letter-spacing:1px;">Administrador</div>
    <div class="profile-handle" id="profEmail">@joaodasilva</div>
    <div class="profile-stats">
      <div class="stat">
        <span class="stat-value" id="statDl">0</span>
        <span class="stat-label">Baixados</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="statFav">0</span>
        <span class="stat-label">Favoritos</span>
      </div>
      <div class="stat">
        <span class="stat-value">0</span>
        <span class="stat-label">Reviews</span>
      </div>
    </div>
    <button class="btn-edit" onclick="openEditModal()">✏️ Editar perfil</button>
  </div>

  <!-- MODAL EDITAR PERFIL -->
  <div class="modal" id="editModal">
    <div class="modal-content">
      <div class="modal-title">Editar Perfil</div>
      
      <div class="form-group">
        <label>Seu Nome</label>
        <input type="text" id="editName" class="form-input">
      </div>

      <div class="form-group">
        <label>Foto de Perfil</label>
        <div style="display:flex; flex-direction:column; gap:8px;">
          <input type="text" id="editPic" class="form-input" placeholder="https://exemplo.com/foto.jpg">
          <div style="text-align:center; color:var(--muted); font-size:0.75rem;">ou</div>
          <label for="filePic" class="btn-edit" style="display:flex; align-items:center; justify-content:center; gap:8px; margin:0; cursor:pointer;">
            📁 Escolher do Dispositivo
          </label>
          <input type="file" id="filePic" accept="image/*" style="display:none;" onchange="handleFileSelect(this)">
          <div id="fileNameDisplay" style="font-size:0.7rem; color:var(--accent); text-align:center; display:none;"></div>
        </div>
      </div>

      <div class="form-group">
        <label>Cor do Perfil (Se não tiver foto)</label>
        <div class="avatar-picker" id="colorPicker">
          <div class="color-opt active" data-color="linear-gradient(135deg, #5b8fff, #7b5cff)" style="background: linear-gradient(135deg, #5b8fff, #7b5cff)"></div>
          <div class="color-opt" data-color="linear-gradient(135deg, #ff5b8f, #ff7b5c)" style="background: linear-gradient(135deg, #ff5b8f, #ff7b5c)"></div>
          <div class="color-opt" data-color="linear-gradient(135deg, #5bff8f, #5cff7b)" style="background: linear-gradient(135deg, #5bff8f, #5cff7b)"></div>
          <div class="color-opt" data-color="linear-gradient(135deg, #ffcf5b, #ff9e5c)" style="background: linear-gradient(135deg, #ffcf5b, #ff9e5c)"></div>
          <div class="color-opt" data-color="linear-gradient(135deg, #cf5bff, #9e5cff)" style="background: linear-gradient(135deg, #cf5bff, #9e5cff)"></div>
        </div>
      </div>

      <div style="display:flex; gap:10px; margin-top:20px;">
        <button class="btn-edit" style="flex:1;" onclick="closeEditModal()">Cancelar</button>
        <button class="btn-dl-page" style="flex:1;" onclick="saveProfile()">Salvar</button>
      </div>
    </div>
  </div>

  <!-- PAINEL ADM (VISÍVEL APENAS PARA ADM) -->
  <div class="profile-section" id="admSection" style="display:none;">
    <div class="profile-section-title">🛡️ Painel de Controle (ADM)</div>
    <div class="menu-item" style="cursor:default; flex-direction:column; align-items:flex-start; gap:10px;">
      <div style="font-size:0.8rem; font-weight:700; color:var(--accent);">Usuários Cadastrados:</div>
      <div id="usersList" style="width:100%; display:flex; flex-direction:column; gap:8px;">
        <!-- Lista de usuários -->
      </div>
    </div>
  </div>

  <!-- MENU DE OPÇÕES -->
  <div class="profile-menu">

    <button class="menu-item" onclick="location.href='#'">
      <span class="menu-icon">❤️</span>
      Meus favoritos
      <span class="menu-arrow">›</span>
    </button>

    <button class="menu-item" onclick="location.href='#'">
      <span class="menu-icon">⭐</span>
      Minhas avaliações
      <span class="menu-arrow">›</span>
    </button>

    <button class="menu-item" onclick="location.href='#'">
      <span class="menu-icon">🔔</span>
      Notificações
      <span class="menu-arrow">›</span>
    </button>

    <button class="menu-item" onclick="location.href='#'">
      <span class="menu-icon">⚙️</span>
      Configurações
      <span class="menu-arrow">›</span>
    </button>

    <button class="menu-item" onclick="location.href='#'">
      <span class="menu-icon">❓</span>
      Ajuda e suporte
      <span class="menu-arrow">›</span>
    </button>

    <button class="menu-item danger" onclick="logout()">
      <span class="menu-icon">🚪</span>
      Sair da conta
    </button>

  </div>

</div>

<nav class="bottom-nav">
  <button class="nav-tab" onclick="location.href='../index.html'">
    <span class="nav-icon">🏠</span>Início
  </button>
  <button class="nav-tab" onclick="location.href='explorar.html'">
    <span class="nav-icon">🔍</span>Explorar
  </button>
  <button class="nav-tab" onclick="location.href='biblioteca.html'">
    <span class="nav-icon">🎮</span>Biblioteca
  </button>
</nav>

<div class="toast" id="toast"></div>
<script src="../js/script.js"></script>
<script>
  // Carregar dados reais do usuário logado
  const userData = JSON.parse(localStorage.getItem('linkey_user_data'));
  if (userData) {
    const nameEl = document.getElementById('profName');
    const emailEl = document.getElementById('profEmail');
    const initEl = document.getElementById('profInit');
    const headAv = document.querySelector('.header-avatar');
    const admBadge = document.getElementById('admBadge');
    const admSection = document.getElementById('admSection');
    const usersList = document.getElementById('usersList');
    
    const statDl = document.getElementById('statDl');
    const statFav = document.getElementById('statFav');
    const dlList = document.getElementById('userDlList');

    if (nameEl) nameEl.textContent = userData.name;
    if (emailEl) emailEl.textContent = userData.email;
    
    // Foto de perfil ou iniciais
    if (userData.profilePic) {
      if (initEl) initEl.innerHTML = `<img src="${userData.profilePic}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`;
      if (headAv) headAv.innerHTML = `<img src="${userData.profilePic}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`;
    } else {
      const nameParts = userData.name.split(' ').filter(p => p.length > 2 || p === p.toUpperCase());
      const initials = (nameParts.length > 1 
        ? nameParts[0][0] + nameParts[nameParts.length - 1][0] 
        : nameParts[0].substring(0, 2)
      ).toUpperCase();
      
      if (initEl) initEl.textContent = initials;
      if (headAv) headAv.textContent = initials;

      // Aplica cor personalizada do avatar se não tiver foto
      if (userData.color) {
        if (initEl) initEl.style.background = userData.color;
        if (headAv) headAv.style.background = userData.color;
      }
    }

    // Se for ADM, mostra o badge, painel e lista de usuários
    if (userData.role === 'admin') {
      if (admBadge) admBadge.style.display = 'block';
      if (admSection) admSection.style.display = 'block';
      if (initEl) {
        initEl.style.boxShadow = '0 0 20px var(--accent)';
        initEl.style.border = '4px solid rgba(255,255,255,0.2)';
      }

      // Renderizar todos os usuários cadastrados
      const allUsers = JSON.parse(localStorage.getItem('linkey_users') || '[]');
      if (usersList) {
        usersList.innerHTML = '';
        allUsers.forEach(u => {
          const uItem = `
            <div style="display:flex; justify-content:space-between; width:100%; border-bottom:1px solid var(--border); padding-bottom:5px; font-size:0.75rem;">
              <span><strong>${u.name}</strong> (${u.role || 'user'})</span>
              <span style="color:var(--muted);">${u.email}</span>
            </div>
          `;
          usersList.innerHTML += uItem;
        });
      }
    }

    // Carregar estatísticas e lista de downloads do banco local
    const userDownloads = getFromUser('downloads');
    const userFavorites = getFromUser('favorites');

    if (statDl) statDl.textContent = userDownloads.length;
    if (statFav) statFav.textContent = userFavorites.length;

    // Renderizar lista de downloads
    if (dlList && userDownloads.length > 0) {
      dlList.innerHTML = ''; // Limpa o "vazio"
      userDownloads.forEach(gameName => {
        const game = GAMES_DATA[gameName] || { cat: "Jogo", img: "https://via.placeholder.com/200" };
        const item = `
          <a href="jogo.html" class="dl-item">
            <img src="${game.img}" alt="${gameName}">
            <div class="dl-item-info">
              <div class="dl-item-name">${gameName}</div>
              <div class="dl-item-cat">${game.cat}</div>
            </div>
            <span class="dl-item-badge">✓ Instalado</span>
          </a>
        `;
        dlList.innerHTML += item;
      });
    }
  }
</script>
</body>
</html>
