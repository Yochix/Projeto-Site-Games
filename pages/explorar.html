<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LinKey — Explorar</title>
<script>
  if (localStorage.getItem('linkey_logged') !== 'true') {
    window.location.href = 'login.html';
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header>
  <a href="../index.html" class="logo">LinKey</a>
  <div class="header-actions">
    <a href="usuario.html" class="header-avatar">JD</a>
  </div>
</header>

<div class="page-inner">

  <!-- BUSCA -->
  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="search" id="search" placeholder="Explorar gêneros, títulos..." autocomplete="off">
    </div>
  </div>

  <!-- CATEGORIAS -->
  <div class="categories-wrap">
    <div class="section-header" style="padding-bottom: 8px;">
      <span class="section-title">📂 Categorias</span>
    </div>
    <div class="categories-scroll" id="categories">
      <button class="cat-pill active" data-cat="all">🎮 Todos</button>
      <button class="cat-pill" data-cat="acao">⚔️ Ação</button>
      <button class="cat-pill" data-cat="aventura">🗺️ Aventura</button>
      <button class="cat-pill" data-cat="rpg">🧙 RPG</button>
      <button class="cat-pill" data-cat="terror">👻 Terror</button>
      <button class="cat-pill" data-cat="estrategia">♟️ Estratégia</button>
      <button class="cat-pill" data-cat="corrida">🏎️ Corrida</button>
      <button class="cat-pill" data-cat="esportes">⚽ Esportes</button>
      <button class="cat-pill" data-cat="simulacao">🚀 Simulação</button>
      <button class="cat-pill" data-cat="casual">🧩 Casual</button>
      <button class="cat-pill" data-cat="luta">🥊 Luta</button>
      <button class="cat-pill" data-cat="puzzle">🧩 Puzzle</button>
      <button class="cat-pill" data-cat="anime">⛩️ Anime</button>
      <button class="cat-pill" data-cat="mundo-aberto">🌍 Mundo Aberto</button>
      <button class="cat-pill" data-cat="fps">🔫 FPS</button>
    </div>
  </div>

  <!-- TENDÊNCIAS (LISTA) -->
  <div class="profile-section" id="trending-section" style="padding-top: 10px;">
    <div class="section-header" style="padding: 0 0 12px;">
      <span class="section-title">📈 Bombando agora</span>
    </div>
    <div class="dl-list" id="trendingList">
      <!-- Carregado via JS -->
    </div>
  </div>

  <!-- GRID DE EXPLORAÇÃO -->
  <div id="grid-section">
    <div class="section-header">
      <span class="section-title" id="grid-title">🔎 Descobrir novos jogos</span>
    </div>

    <div class="games-grid" id="grid">
      <!-- Os cards serão carregados dinamicamente via script.js -->
    </div>

    <div class="empty" id="empty" style="display:none;">
      <div class="empty-icon">🔍</div>
      <div class="empty-title">Nenhum jogo encontrado</div>
    </div>
  </div>

</div>

<nav class="bottom-nav">
  <button class="nav-tab" onclick="location.href='../index.html'">
    <span class="nav-icon">🏠</span>Início
  </button>
  <button class="nav-tab active" onclick="location.href='explorar.html'">
    <span class="nav-icon">🔍</span>Explorar
  </button>
  <button class="nav-tab" onclick="location.href='biblioteca.html'">
    <span class="nav-icon">🎮</span>Biblioteca
  </button>
</nav>

<div class="toast" id="toast"></div>
<script src="../js/script.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    // Renderiza tendências
    const games = await DB.games.getAll();
    const trending = Object.keys(games).slice(0, 3);
    const container = document.getElementById('trendingList');
    
    container.innerHTML = trending.map((k, i) => `
      <a href="jogo.html?id=${encodeURIComponent(k)}" class="dl-item" ${i === 0 ? 'style="border-left: 4px solid var(--accent);"' : ''}>
        <img src="${games[k].img}" alt="">
        <div class="dl-item-info">
          <div class="dl-item-name">${games[k].name}</div>
          <div class="dl-item-cat">#${i+1} em ${games[k].genre.split(' · ')[0]}</div>
        </div>
        <div class="game-card-rating"><span class="s">★</span> ${games[k].rating}</div>
      </a>
    `).join('');

    // A grid já é renderizada pelo script.js no DOMContentLoaded se o elemento #grid existir
  });
</script>
</body>
</html>
